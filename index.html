<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disneyland Speedrun</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="menu">

<h1>Disneyland Speedrun</h1>

<div class="option">
<label>Park</label>
<select id="park">
<option>Disneyland</option>
</select>
</div>

<div class="option">
<label>Crowd Level</label>
<select id="crowd">
<option value=".75">Quiet</option>
<option value="1" selected>Average</option>
<option value="1.25">Busy</option>
<option value="1.5">Holiday</option>
</select>
</div>

<button id="startGame">
Start Run
</button>

</div>

<script src="js/menu.js"></script>

</body>
</html>
