<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disneyland Speedrun</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="topBar">
    <div id="title">Disneyland Speedrun</div>
    <div id="clock">8:00 AM</div>
    <div id="rides">Rides: 0 / 0</div>
    <div id="queue">No queue</div>
    <div id="location">Location: Main Entrance</div>
    <div id="status">Park Open</div>
    <div id="needs">
      Needs Loading...
    </div>
    <div id="mapControls">
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">−</button>
  <button onclick="resetCamera()">Reset</button>

  <button id="menuButton" onclick="togglePauseMenu()">
    Menu
  </button>
</div>
  </div>

  <canvas id="gameCanvas"></canvas>
<div id="ridePanel">
  Select a ride
</div>

<div id="queuePanel">
  No queue
</div>

<div id="pauseMenu">
  <h3>Game Menu</h3>
  <button onclick="togglePauseMenu()">
    Resume
  </button>
  <button onclick="restartRun()">
    Restart Run
  </button>
  <button onclick="returnToMenu()">
    Return to Menu
  </button>
</div>
  
  <script src="js/settings.js"></script>
  <script src="js/graph_new.js"></script>
  <script src="js/rides.js"></script>
  <script src="js/queue.js"></script>
  <script src="js/waitTimes.js"></script>
  <script src="js/needs.js"></script>
  <script src="js/gameTime.js"></script>
  <script src="js/player.js"></script>
  <script src="js/pathfinding.js"></script>
  <script src="js/simulation.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/park.js"></script>
  <script src="js/game.js"></script>

</body>
</html>
